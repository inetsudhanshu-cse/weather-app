<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <link rel="stylesheet" href="weather.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header>
      <h1>Weather App</h1>
      <div class="search-box">
        <input type="text" id="city-input" placeholder="Enter city" />
        <button id="search-btn">Search</button>
      </div>
    </header>

    <section class="current-weather">
      <h2 id="city-name">City Name</h2>
      <div class="weather-info">
        <img id="weather-icon" src="clouds.png" alt="Weather Icon" />
        <p id="temperature">15°C</p>
      </div>

      <div class="details">
        <div class="humidity">
          <img id="humidity-icon" src="humidity.png" alt="Humidity" />
          <span id="humidity-value">Humidity</span>
        </div>
        <div class="wind-speed">
          <img id="wind-icon" src="wind.png" alt="Wind" />
          <span id="wind-value">Wind</span>
        </div>
      </div>
    </section>
  </div>
  <script src="weather.js"></script>
</body>
</html>
